const USERS  = [
  {id:1, name:"Admin User", email:"dan@pathwayiq.com",                    password:"pathway2024",   role:"Auditor"},

const generatePeriods = () => {
  const periods = [];
  const today = new Date();
  const day = today.getDay();
  const lastSunday = new Date(today);
  lastSunday.setDate(today.getDate() - (day===0?0:day));
  lastSunday.setHours(0,0,0,0);
  for(let i=0;i<12;i++){
    const end = new Date(lastSunday);
    end.setDate(lastSunday.getDate()-(i*7));
    const start = new Date(end);
    start.setDate(end.getDate()-6);
    const fmt = d=>d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    periods.push({label:`${fmt(start)} – ${fmt(end)}`,start,end});
  }
  return periods;
};
const PERIODS = generatePeriods();
const fmt = d=>d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});

const Pill = ({color,children}) => {
  const C = {
    green:  {bg:B.greenBg, text:B.green,  border:B.greenBd},
    red:    {bg:B.redBg,   text:B.red,    border:B.redBd},
    yellow: {bg:B.yellowBg,text:B.yellow, border:B.yellowBd},

    steel:  {bg:B.navy2,   text:B.steel,  border:"#2a4060"},

const RatingBar = ({value}) => {
  const pct=Math.min(parseFloat(value)||0,105);
  const color=ratingColor(value);
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,width:"100%"}}>
      <div style={{flex:1,borderRadius:99,height:8,background:B.navy}}>

      </div>
      <span style={{fontSize:11,fontWeight:700,whiteSpace:"nowrap",color,minWidth:48,textAlign:"right"}}>{value}</span>
    </div>
  );
};

const PasteBox = ({label,sublabel,value,onChange}) => {
  const filled=value.trim().length>50;
  return (

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>

const Btn = ({onClick,disabled,color="gold",children,small}) => {

  const callClaude = async (prompt, maxTokens=4000) => {

DATE RANGE: ${period.label}

=== INTELIPAR REPORT ===
${ipar.slice(0,5000)}

=== DETAILED VARIANCE REPORT ===
${detailed.slice(0,5000)}

=== SUMMARY VARIANCE REPORT ===
${summary.slice(0,5000)}

{"staffReport":{"liquor":{"oz":0,"bottles":0,"pct":"","rating":""},"wine":{"oz":0,"bottles":0,"pct":"","rating":""},"champagne":{"oz":0,"bottles":0,"pct":"","rating":""},"beer":{"bottles":0,"cases":0,"pct":"","rating":""},"overallRating":"","potentialRevenueLost":""},"topAuditIssues":[{"category":"","brand":"","used":"","sold":"","missing":"","pctMissing":"","severity":"high","lossType":"","recommendation":"","shiftNote":"","unitCost":""}],"categoryPerformance":[{"name":"","pourCost":"","idealPourCost":"","sculptureRating":"","pctMissing":""}],"keyInsights":[{"type":"warning","title":"","detail":""}],"inventorySummary":{"totalOnHandCost":"","totalRevenue":"","grandTotalPourCost":"","weeklyVarianceCost":""},"deadStock":[{"brand":"","category":"","onHand":"","lastUsed":"","recommendation":""}],"highValueAlerts":[{"brand":"","category":"","unitCost":"","missing":"","dollarLoss":"","likelyCause":"","action":"","shiftNote":""}]}

  };

    const plain=`${editEmail.replace(/<br\s*\/?>/gi,"\n").replace(/<\/p>/gi,"\n\n").replace(/<\/li>/gi,"\n").replace(/<li>/gi,"• ").replace(/<[^>]+>/g,"").replace(/&amp;/g,"&").replace(/&nbsp;/g," ").trim()}

───────────────────────────────
${client.name} Bevinco Report — ${period.label}
Overall Rating: ${sr.overallRating} | Revenue Lost: ${sr.potentialRevenueLost}

CATEGORY SUMMARY
Liquor:    ${sr.liquor?.oz||'—'} oz | ${sr.liquor?.pct||'—'} | Rating: ${sr.liquor?.rating||'—'}
Wine:      ${sr.wine?.oz||'—'} oz | ${sr.wine?.pct||'—'} | Rating: ${sr.wine?.rating||'—'}
Champagne: ${sr.champagne?.oz||'—'} oz | ${sr.champagne?.pct||'—'} | Rating: ${sr.champagne?.rating||'—'}
Beer:      ${sr.beer?.bottles||'—'} btl | Rating: ${sr.beer?.rating||'—'}

${issues.map(i=>`• ${i.brand} — ${i.missing} missing (${i.pctMissing})`).join("\n")}

Sent via Pathway IQ | Approved by ${user.name} | ${new Date().toLocaleString()}`;
    window.location.href=`mailto:${client.email}?subject=${encodeURIComponent(`${client.name} Bevinco Report — ${period.label}`)}&body=${encodeURIComponent(plain)}`;
  };

  const handleDeny=()=>{setStatus("denied");resetForm();setScreen("input");};

    const blob=new Blob([html],{type:"text/html"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=`${client?.name} Bevinco Report ${period?.label}.html`;a.click();
  };

  const buildEmailHtml=(body,rpt,cl,per,usr)=>`<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Bevinco Report – ${cl?.name}</title>

</head><body><div class="wrap">

              <div style={{padding:"10px 20px",fontSize:10,fontWeight:700,color:B.red,background:B.redBg,borderBottom:`1px solid ${B.redBd}`,letterSpacing:"0.15em",textTransform:"uppercase"}}>⚠ Item Focus — 100% Loss — Camera Review Required</div>
              {(report.topAuditIssues||[]).filter(i=>i.lossType==="not_rung_up"||i.pctMissing?.includes("100")).map((iss,i)=>(
                <div key={i} style={{padding:"16px 20px",...rowDivider}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14,color:B.off}}>{iss.brand}</div>
                      <div style={{fontSize:11,color:B.steel,marginTop:2}}>{iss.category}{iss.unitCost?` · Unit Cost: ${iss.unitCost}`:""}</div>
                    </div>
                    <Pill color="red">100% Loss — Not Rung Up</Pill>
                  </div>
                  <div style={{background:`${B.red}11`,border:`1px solid ${B.redBd}`,borderRadius:8,padding:"12px 14px",marginBottom:10}}>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.15em",color:B.red,marginBottom:6,textTransform:"uppercase"}}>📹 Camera Review Window</div>
                    <div style={{fontSize:12,color:"#fca5a5",lineHeight:1.6}}>{iss.shiftNote||"Review all shifts this period — focus on high-volume Friday and Saturday nights."}</div>
                  </div>
                  <div style={{background:`${B.gold}11`,border:`1px solid ${B.gold}44`,borderRadius:8,padding:"12px 14px"}}>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.15em",color:B.gold,marginBottom:6,textTransform:"uppercase"}}>✓ Recommended Action</div>
                    <div style={{fontSize:12,color:B.gold2,lineHeight:1.6}}>{iss.recommendation||"Check POS for this item's transactions. Cross-reference with camera footage and address with the bartender on shift."}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </>}

        {/* ── ISSUES TAB ── */}
        {tab==="issues"&&<>
          <div style={headerRow}>Top Audit Issues</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:600}}>
              <thead>
                <tr style={{background:B.navy}}>
                  {["Brand","Category","Used","Sold","Missing","% Missing"].map(h=>(
                    <th key={h} style={{padding:"8px 16px",fontSize:10,fontWeight:700,color:B.steel,textAlign:"left",borderBottom:`1px solid ${B.navy2}`,letterSpacing:"0.08em",textTransform:"uppercase"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {(report.topAuditIssues||[]).map((iss,i)=>(
                  <tr key={i} style={{...rowDivider}}>
                    <td style={{padding:"12px 16px",fontWeight:600,fontSize:13,color:B.off}}>{iss.brand}</td>
                    <td style={{padding:"12px 16px",fontSize:11,color:B.steel}}>{iss.category}</td>
                    <td style={{padding:"12px 16px",fontSize:13,color:B.off}}>{iss.used}</td>
                    <td style={{padding:"12px 16px",fontSize:13,color:B.off}}>{iss.sold}</td>
                    <td style={{padding:"12px 16px",fontSize:13,fontWeight:700,color:iss.missing?.startsWith("-")?B.red:B.yellow}}>{iss.missing}</td>
                    <td style={{padding:"12px 16px"}}><Pill color={iss.severity==="high"?"red":iss.severity==="medium"?"yellow":"green"}>{iss.pctMissing}</Pill></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>}

        {/* ── PERFORMANCE TAB ── */}
        {tab==="perf"&&<>
          <div style={headerRow}>Category Performance</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:640}}>
              <thead>
                <tr style={{background:B.navy}}>
                  {["Category","Pour Cost","Ideal Pour Cost","Sculpture Rating","Variance"].map(h=>(
                    <th key={h} style={{padding:"8px 16px",fontSize:10,fontWeight:700,color:B.steel,textAlign:"left",borderBottom:`1px solid ${B.navy2}`,letterSpacing:"0.08em",textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {(report.categoryPerformance||[]).map((cat,i)=>(
                  <tr key={i} style={{...rowDivider}}>
                    <td style={{padding:"14px 16px",fontWeight:600,fontSize:13,color:B.off,whiteSpace:"nowrap"}}>{cat.name}</td>
                    <td style={{padding:"14px 16px",fontSize:13,color:B.off}}>{cat.pourCost}</td>
                    <td style={{padding:"14px 16px",fontSize:13,color:B.steel}}>{cat.idealPourCost}</td>
                    <td style={{padding:"14px 16px",minWidth:200}}><RatingBar value={cat.sculptureRating?.replace("%","")||"0"}/></td>
                    <td style={{padding:"14px 16px"}}><Pill color={parseFloat(cat.pctMissing)>0?"red":"green"}>{cat.pctMissing}</Pill></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>}

        {/* ── INSIGHTS TAB ── */}
        {tab==="insights"&&(
          <div style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>
            {(report.keyInsights||[]).map((ins,i)=>{
              const C={
                warning:{bg:`${B.red}11`,border:B.redBd,icon:"⚠️",col:B.red},
                positive:{bg:`${B.green}11`,border:B.greenBd,icon:"✅",col:B.green},
                info:{bg:`${B.gold}11`,border:`${B.gold}44`,icon:"ℹ️",col:B.gold},
              };
              const c=C[ins.type]||C.info;
              return (
                <div key={i} style={{background:c.bg,border:`1px solid ${c.border}`,borderRadius:10,padding:"14px 16px",display:"flex",gap:12}}>
                  <span style={{fontSize:16}}>{c.icon}</span>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:c.col,marginBottom:4}}>{ins.title}</div>
                    <div style={{fontSize:12,color:B.steel,lineHeight:1.6}}>{ins.detail}</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── EMAIL TAB ── */}
        {tab==="email"&&(
          <div style={{padding:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:B.off}}>Client Email Draft</div>
                <div style={{fontSize:11,color:B.steel,marginTop:2}}>To: {client?.contact} &lt;{client?.email}&gt;</div>
              </div>
              <div style={{display:"flex",gap:4,padding:4,borderRadius:8,background:B.navy}}>
                {["preview","edit"].map(t=>(
                  <button key={t} onClick={()=>setEmailTab(t)}
                    style={{padding:"6px 14px",borderRadius:6,border:"none",fontSize:11,fontWeight:700,cursor:"pointer",
                      background:emailTab===t?B.gold:"transparent",color:emailTab===t?B.navy:B.steel}}>
                    {t==="preview"?"👁 Preview":"✏️ Edit"}
                  </button>
                ))}
              </div>
            </div>
            {genEmail?(
              <div style={{textAlign:"center",padding:48}}>
                <div style={{width:40,height:40,borderRadius:"50%",border:`3px solid ${B.navy2}`,borderTopColor:B.gold,animation:"spin 1s linear infinite",margin:"0 auto 14px"}}/>
                <div style={{fontSize:13,color:B.steel}}>Crafting personalized client email in JP's voice…</div>
              </div>
            ):emailTab==="preview"?(
              <div style={{border:`1px solid ${B.navy2}`,borderRadius:10,overflow:"hidden"}}>
                <div style={{padding:"8px 16px",background:B.navy3,borderBottom:`1px solid ${B.navy2}`,fontSize:11,color:B.steel}}>
                  <strong style={{color:B.gold}}>From:</strong> jp@sculpturehospitality.com &nbsp;·&nbsp;
                  <strong style={{color:B.gold}}>To:</strong> {client?.email} &nbsp;·&nbsp;
                  <strong style={{color:B.gold}}>Subject:</strong> {client?.name} Bevinco Report — {period?.label}
                </div>
                <div style={{padding:24,background:"#fff",color:"#111827",fontSize:14,lineHeight:1.7}} dangerouslySetInnerHTML={{__html:editEmail||emailHtml}}/>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <div style={{fontSize:11,color:B.steel}}>Edit the email body below. HTML supported.</div>
                <textarea value={editEmail} onChange={e=>setEditEmail(e.target.value)} rows={18}
                  style={{borderRadius:10,padding:"12px 16px",fontSize:11,fontFamily:"monospace",resize:"vertical",background:B.navy3,border:`1.5px solid ${B.navy2}`,color:"#d1d5db",outline:"none",lineHeight:1.7}}/>
                <div style={{display:"flex",gap:8}}>
                  <Btn small color="navy" onClick={()=>setEditEmail(emailHtml)}>↺ Reset</Btn>
                  <Btn small color="gold" onClick={()=>setEmailTab("preview")}>Preview →</Btn>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Auditor Notes */}
      <div style={{...cardStyle,padding:20,marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:B.off}}>💬 Auditor Notes <span style={{fontWeight:400,fontSize:11,color:B.steel}}>(included in client email if provided)</span></div>
        <textarea value={feedback} onChange={e=>setFeedback(e.target.value)} rows={3}
          placeholder="Add any observations or context from this week's audit…"
          style={{width:"100%",borderRadius:10,padding:"12px 16px",fontSize:13,resize:"vertical",background:B.navy3,border:`1.5px solid ${B.navy2}`,color:B.off,outline:"none"}}/>
      </div>

      {/* Action Bar */}
      {status==="pending"&&(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:B.navy2,border:`1px solid ${B.navy2}`,borderRadius:16,padding:"16px 20px"}}>
          <div style={{fontSize:13,color:B.steel}}>Ready to send to <strong style={{color:B.off}}>{client?.contact}</strong> at <span style={{color:B.gold}}>{client?.email}</span></div>
          <div style={{display:"flex",gap:8}}>
            <Btn color="navy" onClick={()=>{resetForm();setScreen("input");}}>← Back</Btn>
            <Btn color="red" onClick={handleDeny}>✕ Deny</Btn>
            <Btn color="green" onClick={handleApprove}>✓ Approve & Send</Btn>
          </div>
        </div>
      )}
      {status==="approved"&&(
        <div style={{background:`${B.green}11`,border:`1px solid ${B.greenBd}`,borderRadius:16,padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:13,color:B.green}}>✓ Approved — your email client has opened pre-filled. Hit send to deliver to {client?.email}.</div>
          <Btn color="gold" onClick={()=>{resetForm();setScreen("input");}}>Start New Audit →</Btn>
        </div>
      )}
    </>,"Report Review");
  }
  return null;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
